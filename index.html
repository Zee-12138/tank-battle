<style>
* {

body {

    user-select: none;
}

.game-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
}

.game-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 780px;
    padding: 0 10px;
    color: #fff;
}

.game-title {
    font-size: 28px;
    font-weight: bold;
    color: #ffcc00;
    text-shadow: 2px 2px 4px rgba(255, 204, 0, 0.5);
    letter-spacing: 4px;
}

.game-info {
    display: flex;
    gap: 30px;
    font-size: 16px;
    color: #aaa;
}

.game-info span {
    color: #ffcc00;
    font-weight: bold;
}

.game-container {
    position: relative;
    border: 3px solid #444;
    box-shadow: 0 0 30px rgba(100, 100, 100, 0.3), inset 0 0 30px rgba(0, 0, 0, 0.5);
    background: #1a1a1a;
}

canvas {
    display: block;
}

.game-over-overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: rgba(0, 0, 0, 0.75);
    color: #fff;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.5s;
}

.game-over-overlay.active {
    opacity: 1;
    pointer-events: all;
}

.game-over-overlay h1 {
    font-size: 48px;
    margin-bottom: 10px;
    text-shadow: 0 0 20px currentColor;
}

.game-over-overlay .sub {
    font-size: 20px;
    color: #ccc;
    margin-bottom: 30px;
}

.game-over-overlay button {

    font-size: 20px;
    font-family: inherit;
    background: #ffcc00;
    color: #000;
    border: none;
    cursor: pointer;
    border-radius: 4px;
    font-weight: bold;
    letter-spacing: 2px;

}

.game-over-overlay button:hover {

}

.controls-hint {
    color: #555;
    font-size: 13px;

    letter-spacing: 1px;

.controls-hint kbd {

    color: #ffcc00;
    padding: 2px 8px;
    border-radius: 3px;
    border: 1px solid #555;
    font-family: inherit;
    font-size: 12px;
}

// ==================== 音效引擎 (简易合成) ====================
class SoundEngine {
    constructor() {
        this.ctx = null;
    }

    init() {
        try {
            this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        } catch(e) {
            this.ctx = null;
        }
    }

    play(freq, duration, type = 'square', vol = 0.08) {
        if (!this.ctx) return;
        try {
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
            gain.gain.setValueAtTime(vol, this.ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + duration);
            osc.connect(gain);
            gain.connect(this.ctx.destination);
            osc.start(this.ctx.currentTime);
            osc.stop(this.ctx.currentTime + duration);
        } catch(e) {}
    }

    shoot() { this.play(200, 0.1, 'square', 0.06); }
    hit() { this.play(80, 0.2, 'sawtooth', 0.1); }
    explode() { this.play(50, 0.3, 'sawtooth', 0.12); }
    enemyDie() { this.play(150, 0.15, 'square', 0.08); }
    playerDie() { this.play(40, 0.5, 'sawtooth', 0.15); }
    levelUp() { this.play(400, 0.1, 'square', 0.06); setTimeout(()=>this.play(500,0.1,'square',0.06),100); setTimeout(()=>this.play(600,0.15,'square',0.06),200); }
}

// ==================== 粒子系统 ====================
class Particle {
    constructor(x, y, color) {
        this.x = x;
        this.y = y;
        this.vx = (Math.random() - 0.5) * 4;
        this.vy = (Math.random() - 0.5) * 4;
        this.life = 1;
        this.decay = 0.02 + Math.random() * 0.04;
        this.color = color;
        this.size = 2 + Math.random() * 3;
    }

    update() {
        this.x += this.vx;
        this.y += this.vy;
        this.life -= this.decay;
    }

    draw(ctx) {
        ctx.globalAlpha = this.life;
        ctx.fillStyle = this.color;
        ctx.fillRect(this.x - this.size / 2, this.y - this.size / 2, this.size, this.size);
        ctx.globalAlpha = 1;
    }
}

// ==================== 子弹 ====================
class Bullet {
    constructor(x, y, dir, isPlayer) {
        this.x = x;
        this.y = y;
        this.dir = dir;
        this.isPlayer = isPlayer;
        this.speed = isPlayer ? BULLET_SPEED : BULLET_SPEED * 0.8;
        this.alive = true;
        this.size = 4;
    }

    update() {
        const vec = DIR_VECTORS[this.dir];
        this.x += vec.x * this.speed;
        this.y += vec.y * this.speed;

        // 越界
        if (this.x < 0 || this.x > WIDTH || this.y < 0 || this.y > HEIGHT) {
            this.alive = false;
        }

        // 碰撞墙壁
        const col = Math.floor(this.x / TILE_SIZE);
        const row = Math.floor(this.y / TILE_SIZE);
        if (row >= 0 && row < ROWS && col >= 0 && col < COLS) {
            const tile = map[row][col];
            if (tile === TILE.BRICK) {
                this.alive = false;
                map[row][col] = TILE.EMPTY;
                spawnParticles(col * TILE_SIZE + TILE_SIZE / 2, row * TILE_SIZE + TILE_SIZE / 2, '#cc8833', 8);
                sound.hit();
            } else if (tile === TILE.STEEL) {
                this.alive = false;
                spawnParticles(col * TILE_SIZE + TILE_SIZE / 2, row * TILE_SIZE + TILE_SIZE / 2, '#999', 4);
                sound.hit();
            } else if (tile === TILE.BASE) {
                this.alive = false;
                map[row][col] = TILE.EMPTY;
                map[row][col + 1] = TILE.EMPTY;
                map[row + 1][col] = TILE.EMPTY;
                map[row + 1][col + 1] = TILE.EMPTY;
                gameOver('base_destroyed');
            }
        }
    }

    draw(ctx) {
        ctx.fillStyle = this.isPlayer ? '#ffdd44' : '#ff6666';
        ctx.shadowColor = this.isPlayer ? '#ffdd44' : '#ff4444';
        ctx.shadowBlur = 6;
        ctx.fillRect(this.x - this.size / 2, this.y - this.size / 2, this.size, this.size);
        ctx.shadowBlur = 0;
    }
}

// ==================== 坦克基类 ====================
class Tank {
    constructor(x, y, dir, color, isPlayer = false) {
        this.x = x;
        this.y = y;
        this.dir = dir;
        this.color = color;
        this.isPlayer = isPlayer;
        this.speed = isPlayer ? TANK_SPEED : ENEMY_SPEED;
        this.size = TILE_SIZE - 4;
        this.alive = true;
        this.invincible = isPlayer;
        this.invincibleTimer = isPlayer ? RESPAWN_GUARD_TIME : 0;
        this.flashTimer = 0;
        this.moveCooldown = 0;
        this.aiChangeDirTimer = 0;
        this.aiShootTimer = 500 + Math.random() * 1500;
    }

    getRect() {
        return {
            x: this.x - this.size / 2,
            y: this.y - this.size / 2,
            w: this.size,
            h: this.size,
        };
    }

    collidesWithMap(nx, ny) {
        const half = this.size / 2;
        // 检查四个角
        const corners = [
            { x: nx - half + 2, y: ny - half + 2 },
            { x: nx + half - 2, y: ny - half + 2 },
            { x: nx - half + 2, y: ny + half - 2 },
            { x: nx + half - 2, y: ny + half - 2 },
        ];

        for (const c of corners) {
            const col = Math.floor(c.x / TILE_SIZE);
            const row = Math.floor(c.y / TILE_SIZE);
            if (row < 0 || row >= ROWS || col < 0 || col >= COLS) return true;
            const tile = map[row][col];
            if (tile === TILE.BRICK || tile === TILE.STEEL || tile === TILE.BASE) {
                return true;
            }
        }
        return false;
    }

    collidesWithWater(nx, ny) {
        const half = this.size / 2;
        const col = Math.floor(nx / TILE_SIZE);
        const row = Math.floor(ny / TILE_SIZE);
        if (row >= 0 && row < ROWS && col >= 0 && col < COLS) {
            return map[row][col] === TILE.WATER;
        }
        return false;
    }

    collidesWithTank(other) {
        if (other === this || !other.alive) return false;
        const dx = this.x - other.x;
        const dy = this.y - other.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        return dist < this.size;
    }

    move(dir, tanks) {
        if (!this.alive) return;
        if (this.invincible && this.invincibleTimer > 0) {
            // 出生保护期间也可以移动
        }

        const vec = DIR_VECTORS[dir];
        let nx = this.x + vec.x * this.speed;
        let ny = this.y + vec.y * this.speed;

        // 边界检查
        if (nx - this.size / 2 < 0 || nx + this.size / 2 > WIDTH ||
            ny - this.size / 2 < 0 || ny + this.size / 2 > HEIGHT) {
            return;
        }

        // 地图碰撞
        if (this.collidesWithMap(nx, ny)) return;

        // 不进入水域(除非是无敌状态)
        if (!this.invincible && this.collidesWithWater(nx, ny)) return;

        // 坦克碰撞 - 逐轴滑动
        const origX = this.x;
        const origY = this.y;

        this.x = nx;
        this.y = origY;
        let collided = false;
        for (const t of tanks) {
            if (this.collidesWithTank(t)) { collided = true; break; }
        }
        if (collided) {
            this.x = origX;
            this.y = ny;
            collided = false;
            for (const t of tanks) {
                if (this.collidesWithTank(t)) { collided = true; break; }
            }
            if (collided) {
                this.y = origY;
                return;
            }
        }

        this.dir = dir;
    }

    update(dt) {
        if (!this.alive) return;

        if (this.invincibleTimer > 0) {
            this.invincibleTimer -= dt;
            if (this.invincibleTimer <= 0) {
                this.invincible = false;
            }
        }

        this.flashTimer += dt;
    }

    draw(ctx) {
        if (!this.alive) return;

        // 无敌闪烁
        if (this.invincible && Math.floor(this.flashTimer / 100) % 2 === 0) {
            return;
        }

        ctx.save();
        ctx.translate(this.x, this.y);

        // 炮管方向旋转
        const angles = [-Math.PI / 2, 0, Math.PI / 2, Math.PI]; // UP, RIGHT, DOWN, LEFT
        ctx.rotate(angles[this.dir]);

        const s = this.size / 2;

        // 履带
        ctx.fillStyle = '#222';
        ctx.fillRect(-s, -s + 2, s * 2, 5);
        ctx.fillRect(-s, s - 7, s * 2, 5);

        // 履带纹理
        ctx.fillStyle = '#3a3a3a';
        for (let i = -s; i < s; i += 5) {
            ctx.fillRect(i, -s + 2, 3, 5);
            ctx.fillRect(i, s - 7, 3, 5);
        }

        // 车身
        const bodyGrad = ctx.createLinearGradient(0, -s + 7, 0, s - 7);
        bodyGrad.addColorStop(0, this.color);
        bodyGrad.addColorStop(1, this.darken(this.color, 0.4));
        ctx.fillStyle = bodyGrad;
        ctx.fillRect(-s + 3, -s + 8, s * 2 - 6, s * 2 - 16);

        // 车身顶部高光
        ctx.fillStyle = this.lighten(this.color, 0.3);
        ctx.fillRect(-s + 5, -s + 9, s * 2 - 10, 5);

        // 炮塔底座
        ctx.fillStyle = this.darken(this.color, 0.2);
        ctx.beginPath();
        ctx.arc(0, 0, s * 0.55, 0, Math.PI * 2);
        ctx.fill();

        // 炮塔
        const turretGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, s * 0.5);
        turretGrad.addColorStop(0, this.lighten(this.color, 0.2));
        turretGrad.addColorStop(1, this.darken(this.color, 0.3));
        ctx.fillStyle = turretGrad;
        ctx.beginPath();
        ctx.arc(0, 0, s * 0.5, 0, Math.PI * 2);
        ctx.fill();

        // 炮管
        ctx.fillStyle = this.darken(this.color, 0.15);
        ctx.fillRect(-2, -s + 2, 4, -s * 0.55);
        ctx.strokeStyle = '#111';
        ctx.lineWidth = 0.5;
        ctx.strokeRect(-2, -s + 2, 4, -s * 0.55);

        // 炮管高光
        ctx.fillStyle = this.lighten(this.color, 0.3);
        ctx.fillRect(-1, -s + 2, 2, -s * 0.35);

        ctx.restore();
    }

    lighten(color, amount) {
        const hex = color.replace('#', '');
        const r = Math.min(255, parseInt(hex.substring(0, 2), 16) + 60);
        const g = Math.min(255, parseInt(hex.substring(2, 4), 16) + 60);
        const b = Math.min(255, parseInt(hex.substring(4, 6), 16) + 60);
        return `rgb(${r},${g},${b})`;
    }

    darken(color, amount) {
        const hex = color.replace('#', '');
        const r = Math.max(0, parseInt(hex.substring(0, 2), 16) - 50);
        const g = Math.max(0, parseInt(hex.substring(2, 4), 16) - 50);
        const b = Math.max(0, parseInt(hex.substring(4, 6), 16) - 50);
        return `rgb(${r},${g},${b})`;
    }
}

// ==================== 玩家坦克 ====================
class PlayerTank extends Tank {
    constructor(x, y) {
        super(x, y, DIR.UP, '#66cc44', true);
        this.speed = TANK_SPEED;
        this.scoreShield = 0;
        this.powerUp = null;
    }

    update(dt, tanks) {
        super.update(dt);

        if (!this.alive) return;

        if (keys['ArrowUp'] || keys['w'] || keys['W']) {
            this.move(DIR.UP, tanks);
        } else if (keys['ArrowDown'] || keys['s'] || keys['S']) {
            this.move(DIR.DOWN, tanks);
        } else if (keys['ArrowLeft'] || keys['a'] || keys['A']) {
            this.move(DIR.LEFT, tanks);
        } else if (keys['ArrowRight'] || keys['d'] || keys['D']) {
            this.move(DIR.RIGHT, tanks);
        }

        if ((keys[' '] || keys['Space'] || keys['j'] || keys['J']) && !this.invincible) {
            this.shoot();
        }
    }

    shoot() {
        const now = Date.now();
        if (now - lastPlayerShot < PLAYER_SHOOT_COOLDOWN) return;
        lastPlayerShot = now;

        const vec = DIR_VECTORS[this.dir];
        const bx = this.x + vec.x * (this.size / 2 + 6);
        const by = this.y + vec.y * (this.size / 2 + 6);

        // 检查是否已有玩家的两颗子弹
        const playerBullets = bullets.filter(b => b.isPlayer);
        if (playerBullets.length >= 2) return;

        bullets.push(new Bullet(bx, by, this.dir, true));
        sound.shoot();
    }
}

// ==================== 敌方坦克 ====================
class EnemyTank extends Tank {
    constructor(x, y, type = 'normal') {
        const typeMap = {
            normal: { color: '#ee5555', speed: ENEMY_SPEED, score: 100 },
            fast: { color: '#ee8833', speed: ENEMY_SPEED * 1.6, score: 200 },
            heavy: { color: '#9944cc', speed: ENEMY_SPEED * 0.7, score: 300 },
            armor: { color: '#888888', speed: ENEMY_SPEED * 0.8, score: 400 },
        };
        const info = typeMap[type] || typeMap.normal;
        super(x, y, DIR.DOWN, info.color, false);
        this.speed = info.speed;
        this.scoreValue = info.score;
        this.type = type;
        this.aiChangeDirTimer = 800 + Math.random() * 1500;
        this.aiShootTimer = 600 + Math.random() * 2000;
        this.stuckTimer = 0;
        this.lastX = x;
        this.lastY = y;
    }

    update(dt, tanks) {
        super.update(dt);

        if (!this.alive) return;

        // 检测是否卡住
        if (Math.abs(this.x - this.lastX) < 0.1 && Math.abs(this.y - this.lastY) < 0.1) {
            this.stuckTimer += dt;
        } else {
            this.stuckTimer = 0;
        }
        this.lastX = this.x;
        this.lastY = this.y;

        // AI: 变换方向
        this.aiChangeDirTimer -= dt;
        if (this.aiChangeDirTimer <= 0 || this.stuckTimer > 500) {
            this.changeDirection();
            this.aiChangeDirTimer = 600 + Math.random() * 2000;
            this.stuckTimer = 0;
        }

        // 尝试移动
        const vec = DIR_VECTORS[this.dir];
        let nx = this.x + vec.x * this.speed;
        let ny = this.y + vec.y * this.speed;
        const allTanks = [player, ...enemies];
        if (nx - this.size / 2 <= 0 || nx + this.size / 2 >= WIDTH ||
            ny - this.size / 2 <= 0 || ny + this.size / 2 >= HEIGHT ||
            this.collidesWithMap(nx, ny) || this.collidesWithWater(nx, ny)) {
            this.changeDirection();
        } else {
            const origX = this.x;
            const origY = this.y;
            this.x = nx;
            this.y = origY;
            let collided = false;
            for (const t of allTanks) {
                if (this.collidesWithTank(t)) { collided = true; break; }
            }
            if (collided) {
                this.x = origX;
                this.y = ny;
                collided = false;
                for (const t of allTanks) {
                    if (this.collidesWithTank(t)) { collided = true; break; }
                }
                if (collided) {
                    this.x = origX;
                    this.y = origY;
                    this.changeDirection();
                }
            }
        }

        // AI: 射击
        this.aiShootTimer -= dt;
        if (this.aiShootTimer <= 0) {
            this.enemyShoot();
            this.aiShootTimer = ENEMY_SHOOT_INTERVAL * (0.5 + Math.random());
        }
    }

    changeDirection() {
        const dirs = [DIR.UP, DIR.RIGHT, DIR.DOWN, DIR.LEFT];
        // 倾向于向下移动(朝向基地)
        const weights = [0.2, 0.2, 0.4, 0.2];
        const r = Math.random();
        let cum = 0;
        for (let i = 0; i < dirs.length; i++) {
            cum += weights[i];
            if (r <= cum) {
                this.dir = dirs[i];
                break;
            }
        }
    }

    enemyShoot() {
        const vec = DIR_VECTORS[this.dir];
        const bx = this.x + vec.x * (this.size / 2 + 6);
        const by = this.y + vec.y * (this.size / 2 + 6);
        bullets.push(new Bullet(bx, by, this.dir, false));
        sound.shoot();
    }
}

// ==================== 爆炸效果 ====================
class Explosion {
    constructor(x, y, size = 'normal') {
        this.x = x;
        this.y = y;
        this.life = 1;
        const sizes = { small: 300, normal: 500, large: 700 };
        this.maxLife = sizes[size] || 500;
    }

    update(dt) {
        this.life -= dt / this.maxLife;
    }

    draw(ctx) {
        const progress = 1 - this.life;
        const radius = 5 + progress * 25;
        const alpha = this.life;

        ctx.globalAlpha = alpha;
        // 外圈
        ctx.fillStyle = '#ff6600';
        ctx.beginPath();
        ctx.arc(this.x, this.y, radius, 0, Math.PI * 2);
        ctx.fill();

        // 中圈
        ctx.fillStyle = '#ffcc00';
        ctx.beginPath();
        ctx.arc(this.x, this.y, radius * 0.7, 0, Math.PI * 2);
        ctx.fill();

        // 内圈
        ctx.fillStyle = '#ffffff';
        ctx.beginPath();
        ctx.arc(this.x, this.y, radius * 0.35, 0, Math.PI * 2);
        ctx.fill();

        ctx.globalAlpha = 1;
    }
}

// ==================== 辅助函数 ====================
function spawnParticles(x, y, color, count) {
    for (let i = 0; i < count; i++) {
        particles.push(new Particle(x, y, color));
    }
}

function tileToPixel(col, row) {
    return { x: col * TILE_SIZE + TILE_SIZE / 2, y: row * TILE_SIZE + TILE_SIZE / 2 };
}

// ==================== 关卡加载 ====================
function loadLevel(lvl) {
    const mapIndex = (lvl - 1) % LEVEL_MAPS.length;
    // 深拷贝地图
    map = LEVEL_MAPS[mapIndex].map(row => [...row]);

    player = new PlayerTank(WIDTH / 2, HEIGHT - TILE_SIZE * 2);

    enemies = [];
    bullets = [];
    explosions = [];
    particles = [];
    enemySpawnQueue = [];
    spawnIndex = 0;
    spawnTimer = 0;
    lastPlayerShot = 0;

    const numEnemies = ENEMIES_PER_LEVEL_BASE + (lvl - 1) * 2;

    // 生成敌人队列，随着关卡推进出现更强类型的敌人
    const types = ['normal'];
    if (lvl >= 2) types.push('fast');
    if (lvl >= 3) types.push('heavy');
    if (lvl >= 5) types.push('armor');

    for (let i = 0; i < numEnemies; i++) {
        const type = types[Math.floor(Math.random() * types.length)];
        enemySpawnQueue.push(type);
    }

    enemiesRemaining = numEnemies;
    spawnEnemy();

    updateHUD();
}

function spawnEnemy() {
    if (spawnIndex >= enemySpawnQueue.length) return;

    // 出生点: 上方三个位置
    const spawnCols = [0, Math.floor(COLS / 2), COLS - 1];
    const col = spawnCols[spawnIndex % 3];
    const pos = tileToPixel(col, 0);

    // 检查出生点是否被占据
    const allTanks = [player, ...enemies];
    const occupied = allTanks.some(t =>
        t.alive && Math.abs(t.x - pos.x) < TILE_SIZE && Math.abs(t.y - pos.y) < TILE_SIZE
    );

    if (occupied) {
        // 延迟重试
        setTimeout(() => spawnEnemy(), 500);
        return;
    }

    const type = enemySpawnQueue[spawnIndex];
    const enemy = new EnemyTank(pos.x, pos.y, type);
    enemies.push(enemy);
    spawnIndex++;
}

// ==================== 游戏逻辑 ====================
function checkBulletTankCollisions() {
    for (const bullet of bullets) {
        if (!bullet.alive) continue;

        if (bullet.isPlayer) {
            // 玩家子弹 vs 敌人
            for (const enemy of enemies) {
                if (!enemy.alive) continue;
                const dx = bullet.x - enemy.x;
                const dy = bullet.y - enemy.y;
                if (Math.abs(dx) < enemy.size / 2 && Math.abs(dy) < enemy.size / 2) {
                    bullet.alive = false;
                    enemy.alive = false;
                    explosions.push(new Explosion(enemy.x, enemy.y, 'normal'));
                    spawnParticles(enemy.x, enemy.y, enemy.color, 15);
                    score += enemy.scoreValue;
                    sound.enemyDie();
                    enemiesRemaining--;
                    updateHUD();
                    break;
                }
            }
        } else {
            // 敌人子弹 vs 玩家
            if (!player.alive || player.invincible) continue;
            const dx = bullet.x - player.x;
            const dy = bullet.y - player.y;
            if (Math.abs(dx) < player.size / 2 && Math.abs(dy) < player.size / 2) {
                bullet.alive = false;
                playerDie();
                break;
            }
        }
    }
}

function checkBulletBulletCollisions() {
    for (let i = 0; i < bullets.length; i++) {
        for (let j = i + 1; j < bullets.length; j++) {
            const a = bullets[i];
            const b = bullets[j];
            if (!a.alive || !b.alive) continue;
            if (a.isPlayer === b.isPlayer) continue;

            const dx = a.x - b.x;
            const dy = a.y - b.y;
            if (Math.abs(dx) < 6 && Math.abs(dy) < 6) {
                a.alive = false;
                b.alive = false;
                explosions.push(new Explosion((a.x + b.x) / 2, (a.y + b.y) / 2, 'small'));
                spawnParticles((a.x + b.x) / 2, (a.y + b.y) / 2, '#ffffff', 5);
            }
        }
    }
}

function playerDie() {
    player.alive = false;
    explosions.push(new Explosion(player.x, player.y, 'large'));
    spawnParticles(player.x, player.y, '#66cc44', 20);
    sound.playerDie();
    lives--;

    if (lives <= 0) {
        setTimeout(() => gameOver('no_lives'), 800);
    } else {
        // 重生
        setTimeout(() => {
            player.x = WIDTH / 2;
            player.y = HEIGHT - TILE_SIZE * 2;
            player.alive = true;
            player.invincible = true;
            player.invincibleTimer = RESPAWN_GUARD_TIME;
            player.dir = DIR.UP;
        }, 1000);
    }
    updateHUD();
}

function gameOver(reason) {
    gameState = 'over';
    overlay.classList.add('active');

    if (reason === 'base_destroyed') {
        overTitle.textContent = '基地被毁!';
        overTitle.style.color = '#ff4444';
        overSub.textContent = `你的基地被摧毁了！得分: ${score}`;
    } else if (reason === 'no_lives') {
        overTitle.textContent = 'GAME OVER';
        overTitle.style.color = '#ff6666';
        overSub.textContent = `生命耗尽！最终得分: ${score}`;
    } else if (reason === 'victory') {
        overTitle.textContent = '🎉 胜 利 🎉';
        overTitle.style.color = '#ffcc00';
        overSub.textContent = `太棒了！得分: ${score}  前往第 ${level + 1} 关...`;
    }
}

function checkVictory() {
    if (enemiesRemaining <= 0 && spawnIndex >= enemySpawnQueue.length) {
        const allDead = enemies.every(e => !e.alive);
        if (allDead) {
            sound.levelUp();
            if (reason === 'victory_pending') return;
            gameOver('victory');

            // 自动进入下一关
            setTimeout(() => {
                level++;
                overlay.classList.remove('active');
                gameState = 'playing';
                loadLevel(level);
            }, 2500);
            return true;
        }
    }
    return false;
}

function updateHUD() {
    levelEl.textContent = level;
    scoreEl.textContent = score;
    livesEl.textContent = '♥'.repeat(Math.max(0, lives));
}

// ==================== 主循环 ====================
let lastTime = 0;

function gameLoop(timestamp) {
    animationId = requestAnimationFrame(gameLoop);

    if (!lastTime) lastTime = timestamp;
    let dt = timestamp - lastTime;
    lastTime = timestamp;

    // 防止大帧跳跃
    if (dt > 100) dt = 16;

    if (gameState !== 'playing') {
        draw();
        return;
    }

    update(dt);
    draw();
}

function update(dt) {
    // 更新玩家
    const allTanks = [player, ...enemies.filter(e => e.alive)];
    player.update(dt, allTanks);

    // 更新敌人
    for (const enemy of enemies) {
        enemy.update(dt, allTanks);
    }

    // 检查是否需要生成新敌人
    if (spawnIndex < enemySpawnQueue.length) {
        const aliveEnemies = enemies.filter(e => e.alive).length;
        if (aliveEnemies < 4) {
            spawnTimer += dt;
            if (spawnTimer > 2000) {
                spawnEnemy();
                spawnTimer = 0;
            }
        }
    }

    // 更新子弹
    for (const bullet of bullets) {
        bullet.update();
    }

    // 碰撞检测
    checkBulletTankCollisions();
    checkBulletBulletCollisions();

    // 清理
    bullets = bullets.filter(b => b.alive);
    enemies = enemies.filter(e => e.alive);
    explosions = explosions.filter(e => e.life > 0);
    particles = particles.filter(p => p.life > 0);

    // 更新特效
    for (const exp of explosions) exp.update(dt);
    for (const p of particles) {
        p.update();
    }

    // 检查胜利
    if (!checkVictory()) {
        // 更新无敌计时器等
    }
}

function draw() {
    // 背景
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(0, 0, WIDTH, HEIGHT);

    // 绘制地图
    drawMap();

    // 绘制所有坦克
    for (const enemy of enemies) {
        enemy.draw(ctx);
    }
    if (player) player.draw(ctx);

    // 绘制子弹
    for (const bullet of bullets) {
        bullet.draw(ctx);
    }

    // 绘制爆炸
    for (const exp of explosions) {
        exp.draw(ctx);
    }

    // 绘制粒子
    for (const p of particles) {
        p.draw(ctx);
    }

    // 绘制基地血量指示器
    drawBaseIndicator();

    // 暂停提示
    if (gameState === 'paused') {
        ctx.fillStyle = 'rgba(0,0,0,0.6)';
        ctx.fillRect(0, 0, WIDTH, HEIGHT);
        ctx.fillStyle = '#ffcc00';
        ctx.font = 'bold 48px "Microsoft YaHei", "Courier New", monospace';
        ctx.textAlign = 'center';
        ctx.fillText('暂 停', WIDTH / 2, HEIGHT / 2);
        ctx.textAlign = 'start';
    }

    // 等待开始
    if (gameState === 'waiting') {
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.fillRect(0, 0, WIDTH, HEIGHT);
        ctx.fillStyle = '#ffcc00';
        ctx.font = 'bold 36px "Microsoft YaHei", "Courier New", monospace';
        ctx.textAlign = 'center';
        ctx.fillText('按 Enter 开始游戏', WIDTH / 2, HEIGHT / 2);
        ctx.fillStyle = '#aaa';
        ctx.font = '18px "Microsoft YaHei", "Courier New", monospace';
        ctx.fillText('保护你的基地，消灭所有敌人！', WIDTH / 2, HEIGHT / 2 + 45);
        ctx.textAlign = 'start';
    }
}

function drawMap() {
    for (let row = 0; row < ROWS; row++) {
        for (let col = 0; col < COLS; col++) {
            const x = col * TILE_SIZE;
            const y = row * TILE_SIZE;
            const tile = map[row][col];

            switch (tile) {
                case TILE.BRICK:
                    // 砖墙
                    ctx.fillStyle = '#cc6633';
                    ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
                    ctx.fillStyle = '#993311';
                    // 砖块纹理
                    for (let bx = 0; bx < TILE_SIZE; bx += 10) {
                        for (let by = 0; by < TILE_SIZE; by += 10) {
                            ctx.fillStyle = (bx + by) % 20 === 0 ? '#b8552a' : '#cc6633';
                            ctx.fillRect(x + bx, y + by, 9, 9);
                            ctx.fillStyle = 'rgba(0,0,0,0.15)';
                            ctx.fillRect(x + bx + 8, y + by, 2, 9);
                            ctx.fillRect(x + bx, y + by + 8, 10, 2);
                        }
                    }
                    break;
                case TILE.STEEL:
                    // 钢铁墙
                    ctx.fillStyle = '#888';
                    ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
                    const steelGrad = ctx.createLinearGradient(x, y, x + TILE_SIZE, y + TILE_SIZE);
                    steelGrad.addColorStop(0, '#aaa');
                    steelGrad.addColorStop(0.3, '#777');
                    steelGrad.addColorStop(0.7, '#666');
                    steelGrad.addColorStop(1, '#999');
                    ctx.fillStyle = steelGrad;
                    ctx.fillRect(x + 2, y + 2, TILE_SIZE - 4, TILE_SIZE - 4);
                    ctx.strokeStyle = '#555';
                    ctx.lineWidth = 1;
                    ctx.strokeRect(x + 2, y + 2, TILE_SIZE - 4, TILE_SIZE - 4);
                    // 铆钉
                    ctx.fillStyle = '#444';
                    [
                        [x + 6, y + 6], [x + TILE_SIZE - 10, y + 6],
                        [x + 6, y + TILE_SIZE - 10], [x + TILE_SIZE - 10, y + TILE_SIZE - 10]
                    ].forEach(([rx, ry]) => {
                        ctx.beginPath();
                        ctx.arc(rx, ry, 3, 0, Math.PI * 2);
                        ctx.fill();
                    });
                    break;
                case TILE.WATER:
                    // 水面
                    ctx.fillStyle = '#2255aa';
                    ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
                    ctx.fillStyle = 'rgba(100,180,255,0.3)';
                    const waveOffset = Date.now() / 500;
                    for (let wy = 0; wy < TILE_SIZE; wy += 8) {
                        ctx.fillRect(x, y + wy + Math.sin(waveOffset + wy * 0.5) * 2, TILE_SIZE, 3);
                    }
                    break;
                case TILE.BASE:
                    // 基地(鹰)
                    ctx.fillStyle = '#333';
                    ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
                    ctx.fillStyle = '#444';
                    ctx.fillRect(x + 2, y + 2, TILE_SIZE - 4, TILE_SIZE - 4);
                    // 鹰标志
                    ctx.fillStyle = '#ffcc00';
                    ctx.font = 'bold 24px serif';
                    ctx.textAlign = 'center';
                    ctx.fillText('🦅', x + TILE_SIZE / 2, y + TILE_SIZE / 2 + 8);
                    ctx.textAlign = 'start';
                    break;
                case TILE.TREE:
                    // 树木(遮挡视线)
                    ctx.fillStyle = '#1a1a1a';
                    ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
                    ctx.fillStyle = '#2d5a1e';
                    ctx.beginPath();
                    ctx.arc(x + TILE_SIZE / 2, y + TILE_SIZE / 2, TILE_SIZE / 2 - 2, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = '#3a7a28';
                    ctx.beginPath();
                    ctx.arc(x + TILE_SIZE / 2, y + TILE_SIZE / 2, TILE_SIZE / 2 - 5, 0, Math.PI * 2);
                    ctx.fill();
                    break;
            }
        }
    }
}

function drawBaseIndicator() {
    // 检查基地是否还在
    let baseAlive = false;
    for (let row = 0; row < ROWS; row++) {
        for (let col = 0; col < COLS; col++) {
            if (map[row][col] === TILE.BASE) {
                baseAlive = true;
                break;
            }
        }
        if (baseAlive) break;
    }

    if (!baseAlive) {
        ctx.fillStyle = '#ff0000';
        ctx.font = 'bold 20px "Microsoft YaHei", "Courier New", monospace';
        ctx.textAlign = 'center';
        ctx.fillText('基地已毁!', WIDTH / 2, 30);
        ctx.textAlign = 'start';
    }
}

// ==================== 事件处理 ====================
document.addEventListener('keydown', (e) => {
    keys[e.key] = true;

    if (e.key === 'p' || e.key === 'P') {
        if (gameState === 'playing') {
            gameState = 'paused';
        } else if (gameState === 'paused') {
            gameState = 'playing';
        }
    }

    if (e.key === 'Enter') {
        if (gameState === 'waiting') {
            sound.init();
            gameState = 'playing';
            lastTime = 0;
        }
    }

    // 防止方向键滚动
    if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' '].includes(e.key)) {
        e.preventDefault();
    }
});

document.addEventListener('keyup', (e) => {
    keys[e.key] = false;
});

restartBtn.addEventListener('click', () => {
    sound.init();
    overlay.classList.remove('active');
    score = 0;
    lives = 3;
    level = 1;
    gameState = 'playing';
    loadLevel(1);
    lastTime = 0;
});

// ==================== 触摸控制(移动端) ====================
let touchStartX = 0;
let touchStartY = 0;
let touchActive = false;

canvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    sound.init();
    if (gameState === 'waiting') {
        gameState = 'playing';
        lastTime = 0;
        return;
    }
    if (gameState === 'over') return;
    const touch = e.touches[0];
    touchStartX = touch.clientX;
    touchStartY = touch.clientY;
    touchActive = true;
});

canvas.addEventListener('touchmove', (e) => {
    e.preventDefault();
    if (!touchActive || gameState !== 'playing') return;
    const touch = e.touches[0];
    const dx = touch.clientX - touchStartX;
    const dy = touch.clientY - touchStartY;

    keys['ArrowUp'] = false;
    keys['ArrowDown'] = false;
    keys['ArrowLeft'] = false;
    keys['ArrowRight'] = false;

    if (Math.abs(dx) > Math.abs(dy)) {
        keys['ArrowRight'] = dx > 10;
        keys['ArrowLeft'] = dx < -10;
    } else {
        keys['ArrowDown'] = dy > 10;
        keys['ArrowUp'] = dy < -10;
    }
});

canvas.addEventListener('touchend', (e) => {
    e.preventDefault();
    keys['ArrowUp'] = false;
    keys['ArrowDown'] = false;
    keys['ArrowLeft'] = false;
    keys['ArrowRight'] = false;
    touchActive = false;

    // 短触 = 射击
    if (gameState === 'playing' && player && player.alive) {
        player.shoot();
    }
});

// ==================== 启动 ====================
function init() {
    loadLevel(1);
    gameState = 'waiting';
    lastTime = 0;
    animationId = requestAnimationFrame(gameLoop);
}

init();
</script>
